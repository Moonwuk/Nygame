name: Security scan

# Security pipeline. Runs a DIVERSE set of scanners on EVERY push (any branch) —
# different methods / data sources / surfaces, not clones — aggregates everything
# into ONE report, and posts it back (sticky PR comment, or a commit comment
# otherwise) + job summary + artifact.
#
# === GATING (SEC-1 ratchet) ===
#
# Triaged scanners are BLOCKING: semgrep, gitleaks, osv, trivy-fs, trivy-image.
# Baseline was fixed at ZERO findings (triage 2026-07-10: local gitleaks v8.18.4 +
# pnpm audit runs, CI runs of the pinned images — all clean; the only accepted
# suppressions are the justified base-image CVEs in .trivyignore). Their gate step
# fails the job on ANY non-zero scanner exit — findings AND scanner/infra failures
# both block (fail-secure, OWASP A10): a scanner that couldn't run can't certify.
# New suppressions go to .semgrepignore / .gitleaks.toml / .trivyignore WITH a
# reason + date (see docs/security/pipeline.md).
# Still informational (not yet triaged as bricks): codeql, trufflehog, zizmor,
# scorecard, and the `check` job (its blocking twin lives in ci.yml).
#
# Each scan job writes a `status-<key>.json` sentinel AFTER the scan with the real
# exit code / outcome. The summarizer LEADS with a scan-confirmation table built from
# those sentinels, so a silently-failed scanner is flagged "⚠️ NOT confirmed" instead
# of a misleading quiet "0 findings" (anti fail-open — audit F-08).
#
# === SECURITY HARDENING (SEC-3) ===
#
# Hardening (self-flagged by the zizmor job): every checkout sets
# `persist-credentials: false` (jobs only read — none push — so the workflow token
# must not linger in .git/config, artifact/credential-persistence), and every
# `${{ steps.*.outcome }}` is read via an `env:` var (`$VAR`) instead of being
# expanded inline into a `run:` shell (template-injection prevention).
#
# Actions are SHA-pinned (SD-6.1 / F-16) with a trailing `# vN` for readability.
#
# Docker images are pinned by sha256 digest (supply-chain integrity):
#   - All scanners: semgrep, gitleaks, trufflehog, osv-scanner, trivy, syft, zizmor
#   - Reason: prevents tag reuse / MITM / registry compromise attacks
#   - Update method: ./.github/scripts/update-image-digests.sh (re-pin every month)
#   - See docs/security/image-pinning.md for details
#   - Last updated: 2026-07
#
# Variables and secrets (least privilege):
#   - Secrets ALWAYS use ${{ secrets.NAME }} (auto-masked in logs)
#   - Permissions: each job declares ONLY what it needs (contents/pull-requests/issues)
#   - Protected branches: main requires green checks + code review (prevents direct push)
#   - GITHUB_TOKEN (auto-rotated) used instead of long-lived PAT
#   - See docs/security/ci-variables.md for guidelines
#
# This workflow is itself checked by zizmor (GitHub Actions security scanner).

on:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  check:
    name: lint + typecheck + test + audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm run check
        id: check
        continue-on-error: true
        run: pnpm run check
      # pnpm audit retired: npm shut down both audit endpoints (HTTP 410, 2026-07).
      # SCA over the lockfiles is carried by the BLOCKING osv job below (osv.dev
      # mirrors GHSA) and by ci.yml's OSV step — no separate audit sentinel.
      - name: sentinels
        env:
          CHECK_OUTCOME: ${{ steps.check.outcome }}
        run: |
          echo "{\"check\":\"$CHECK_OUTCOME\"}" > check-status.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-check
          path: |
            check-status.json
          if-no-files-found: warn

  semgrep:
    name: SAST patterns (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: semgrep — custom rule unit tests (SEC-2)
        run: |
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6 \
            semgrep --test .semgrep/rules --metrics=off
      - name: semgrep
        id: scan
        run: |
          set +e
          # --error → exit 1 on findings (blocking, SEC-1)
          docker run --rm -v "$PWD:/src" -w /src semgrep/semgrep@sha256:06938c1f365d3f67b8cedd8bc117607ae64253f88a0e768e9da9408548927dd6 \
            semgrep scan --config=p/typescript --config=p/javascript --config=p/security-audit --config=.semgrep/rules \
            --error --sarif --output=semgrep.sarif --metrics=off
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s semgrep.sarif ] || ok=false
          echo "{\"key\":\"semgrep\",\"ok\":$ok,\"exit\":$rc}" > status-semgrep.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-semgrep
          path: |
            semgrep.sarif
            status-semgrep.json
          if-no-files-found: warn
      - name: upload to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep
      - name: gate — blocking on findings or scan failure (SEC-1)
        env:
          RC: ${{ steps.scan.outputs.rc }}
        run: |
          if [ "$RC" != "0" ]; then
            echo "::error::Semgrep is a blocking scanner (SEC-1): findings or scan failure (exit $RC). Fix the finding or suppress WITH justification (.semgrepignore / nosemgrep + reason)."
            exit 1
          fi

  codeql:
    name: SAST dataflow (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
      - id: cqa
        continue-on-error: true
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: codeql
          output: codeql-out
          upload: always
      - name: sentinel
        if: always()
        env:
          CQA_OUTCOME: ${{ steps.cqa.outcome }}
        run: |
          ok=false
          if [ "$CQA_OUTCOME" = "success" ]; then ok=true; fi
          echo "{\"key\":\"codeql\",\"ok\":$ok}" > status-codeql.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: report-codeql
          path: |
            codeql-out/**/*.sarif
            status-codeql.json
          if-no-files-found: warn

  gitleaks:
    name: Secrets — tree (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: gitleaks
        id: scan
        run: |
          set +e
          # TODO: Update to sha256 digest — run: ./.github/scripts/update-image-digests.sh
          # Currently pinned by tag (v8.18.4); sha256 provides supply-chain integrity
          # exits 1 on leaks by default (blocking, SEC-1)
          docker run --rm -v "$PWD:/src" -w /src zricethezav/gitleaks:v8.18.4 \
            detect --source=/src --no-git --redact \
            --report-format sarif --report-path gitleaks.sarif
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s gitleaks.sarif ] || ok=false
          echo "{\"key\":\"gitleaks\",\"ok\":$ok,\"exit\":$rc}" > status-gitleaks.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-gitleaks
          path: |
            gitleaks.sarif
            status-gitleaks.json
          if-no-files-found: warn
      - name: upload to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      - name: gate — blocking on findings or scan failure (SEC-1)
        env:
          RC: ${{ steps.scan.outputs.rc }}
        run: |
          if [ "$RC" != "0" ]; then
            echo "::error::Gitleaks is a blocking scanner (SEC-1): leak found or scan failure (exit $RC). Rotate the secret; allowlist ONLY known-public fixtures via .gitleaks.toml WITH justification."
            exit 1
          fi

  trufflehog:
    name: Secrets — history + verify (TruffleHog)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history — the differentiator vs Gitleaks (--no-git)
          persist-credentials: false
      - name: trufflehog
        continue-on-error: true
        run: |
          set +e
          docker run --rm -v "$PWD:/src" -w /src trufflesecurity/trufflehog@sha256:de8ef4e573653b30c002e3491bf0484d23e31b73fe5519db6b395408e6834d4f \
            git file:///src --json --no-update > trufflehog.json 2>/dev/null
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          echo "{\"key\":\"trufflehog\",\"ok\":$ok,\"exit\":$rc}" > status-trufflehog.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-trufflehog
          path: |
            trufflehog.json
            status-trufflehog.json
          if-no-files-found: warn

  osv:
    name: SCA — osv.dev (OSV-Scanner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: osv-scanner
        id: scan
        run: |
          set +e
          # TODO: Update to sha256 digest — run: ./.github/scripts/update-image-digests.sh
          # Supply-chain integrity: pin image digest to prevent tag reuse attacks
          # exits 1 on vulnerabilities by default (blocking, SEC-1)
          docker run --rm -v "$PWD:/src" -w /src ghcr.io/google/osv-scanner:v1.9.1 \
            --lockfile=pnpm-lock.yaml --lockfile=mobile/package-lock.json \
            --format=sarif --output=osv.sarif
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s osv.sarif ] || ok=false
          echo "{\"key\":\"osv\",\"ok\":$ok,\"exit\":$rc}" > status-osv.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-osv
          path: |
            osv.sarif
            status-osv.json
          if-no-files-found: warn
      - name: upload to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: osv.sarif
          category: osv-scanner
      - name: gate — blocking on findings or scan failure (SEC-1)
        env:
          RC: ${{ steps.scan.outputs.rc }}
        run: |
          if [ "$RC" != "0" ]; then
            echo "::error::OSV-Scanner is a blocking scanner (SEC-1): vulnerability found or scan failure (exit $RC). Update the dependency; ignore ONLY with [[IgnoredVulns]] in osv-scanner.toml WITH justification + expiry."
            exit 1
          fi

  trivy-fs:
    name: Vuln + IaC — files (Trivy fs)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: trivy fs
        id: scan
        run: |
          set +e
          # TODO: Update to sha256 digest — run: ./.github/scripts/update-image-digests.sh
          # Pin docker image digest for supply-chain integrity (prevents tag hijacking)
          # --exit-code 1 → exit 1 on findings (blocking, SEC-1); .trivyignore applies
          docker run --rm -v "$PWD:/src" -w /src aquasec/trivy:0.58.2 \
            fs --scanners vuln,secret,misconfig --exit-code 1 --format sarif --output trivy.sarif .
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s trivy.sarif ] || ok=false
          echo "{\"key\":\"trivy-fs\",\"ok\":$ok,\"exit\":$rc}" > status-trivy-fs.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-trivy-fs
          path: |
            trivy.sarif
            status-trivy-fs.json
          if-no-files-found: warn
      - name: upload to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy.sarif
          category: trivy-fs
      - name: gate — blocking on findings or scan failure (SEC-1)
        env:
          RC: ${{ steps.scan.outputs.rc }}
        run: |
          if [ "$RC" != "0" ]; then
            echo "::error::Trivy fs is a blocking scanner (SEC-1): finding or scan failure (exit $RC). Fix it; suppress ONLY via .trivyignore WITH CVE-id, reason and review date."
            exit 1
          fi

  trivy-image:
    name: Vuln — built image base OS (Trivy image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: build image
        continue-on-error: true
        run: docker build -t void-dominion:scan .
      - name: trivy image + image SBOM
        id: scan
        run: |
          set +e
          # TODO: Update to sha256 digests — run: ./.github/scripts/update-image-digests.sh
          # Docker image pinning (aquasec/trivy + anchore/syft) for supply-chain integrity
          # --exit-code 1 → exit 1 on findings (blocking, SEC-1); .trivyignore applies
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/out" -w /out \
            aquasec/trivy:0.58.2 image --exit-code 1 --format sarif --output trivy-image.sarif void-dominion:scan
          rc=$?
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock -v "$PWD:/out" -w /out \
            anchore/syft:v1.20.0 scan void-dominion:scan -o cyclonedx-json=sbom-image.cdx.json
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s trivy-image.sarif ] || ok=false
          echo "{\"key\":\"trivy-image\",\"ok\":$ok,\"exit\":$rc}" > status-trivy-image.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-trivy-image
          path: |
            trivy-image.sarif
            sbom-image.cdx.json
            status-trivy-image.json
          if-no-files-found: warn
      - name: upload to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
      - name: gate — blocking on findings or scan failure (SEC-1)
        env:
          RC: ${{ steps.scan.outputs.rc }}
        run: |
          if [ "$RC" != "0" ]; then
            echo "::error::Trivy image is a blocking scanner (SEC-1): finding or scan/build failure (exit $RC). Fix the image; suppress ONLY via .trivyignore WITH CVE-id, reason and review date."
            exit 1
          fi

  sbom:
    name: SBOM — files (Syft / CycloneDX)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: syft sbom
        continue-on-error: true
        run: |
          set +e
          # TODO: Update to sha256 digest — run: ./.github/scripts/update-image-digests.sh
          # Image pinning: anchore/syft by digest for supply-chain integrity
          docker run --rm -v "$PWD:/src" -w /src anchore/syft:v1.20.0 \
            scan dir:/src -o cyclonedx-json=sbom.cdx.json
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s sbom.cdx.json ] || ok=false
          echo "{\"key\":\"sbom\",\"ok\":$ok,\"exit\":$rc}" > status-sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-sbom
          path: |
            sbom.cdx.json
            status-sbom.json
          if-no-files-found: warn

  zizmor:
    name: Workflow security (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: zizmor
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          docker run --rm -e GH_TOKEN -v "$PWD:/src" -w /src ghcr.io/zizmorcore/zizmor@sha256:d1117e5dbd9ee4970644067b534ab6ab50371f3c6f7f4d05446eb603a6e78f48 \
            --format sarif . > zizmor.sarif
          rc=$?
          set -e
          ok=true; case $rc in 125 | 126 | 127) ok=false ;; esac
          [ -s zizmor.sarif ] || ok=false
          echo "{\"key\":\"zizmor\",\"ok\":$ok,\"exit\":$rc}" > status-zizmor.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: report-zizmor
          path: |
            zizmor.sarif
            status-zizmor.json
          if-no-files-found: warn
      - name: upload to code scanning
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: zizmor.sarif
          category: zizmor

  scorecard:
    name: Repo posture (OpenSSF Scorecard)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # posture checks are meaningful on the default branch
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: sc
        continue-on-error: true
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - name: sentinel
        if: always()
        env:
          SC_OUTCOME: ${{ steps.sc.outcome }}
        run: |
          ok=false
          if [ "$SC_OUTCOME" = "success" ]; then ok=true; fi
          echo "{\"key\":\"scorecard\",\"ok\":$ok}" > status-scorecard.json
      - name: upload to code scanning
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: scorecard.sarif
          category: scorecard
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: report-scorecard
          path: |
            scorecard.sarif
            status-scorecard.json
          if-no-files-found: warn

  report:
    name: summarize + report
    needs:
      [
        check,
        semgrep,
        codeql,
        gitleaks,
        trufflehog,
        osv,
        trivy-fs,
        trivy-image,
        sbom,
        zizmor,
        scorecard,
      ]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit comments
      pull-requests: write # PR comments
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: reports
      - name: summarize
        run: node .github/scripts/summarize-security.mjs reports security-report.md
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
      - name: job summary
        run: cat security-report.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: security-report
          path: |
            security-report.md
            reports/**/*.sarif
            reports/**/*.cdx.json
          if-no-files-found: warn
      - name: post report (sticky PR comment or commit comment)
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- void-security-report -->';
            const body = marker + '\n' + fs.readFileSync('security-report.md', 'utf8');
            const { owner, repo } = context.repo;
            const sha = context.sha;
            let prs = [];
            try {
              const res = await github.rest.repos.listPullRequestsAssociatedWithCommit({ owner, repo, commit_sha: sha });
              prs = res.data.filter((p) => p.state === 'open');
            } catch (e) {
              core.warning('PR lookup failed: ' + e.message);
            }
            if (prs.length) {
              for (const pr of prs) {
                const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: pr.number, per_page: 100 });
                const existing = comments.find((c) => c.body && c.body.includes(marker));
                if (existing) {
                  await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
                } else {
                  await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
                }
              }
            } else {
              await github.rest.repos.createCommitComment({ owner, repo, commit_sha: sha, body });
            }

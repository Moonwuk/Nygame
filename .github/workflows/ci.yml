name: CI

# The gate for every push to main and every PR: lint + typecheck + test + audit.
# A Postgres service is attached and DATABASE_URL is set, so the durable-path adapter
# tests (store.test.ts, gated behind DATABASE_URL) actually run in CI instead of being
# skipped — the production persistence path is exercised, not just the in-memory one.
# Actions are SHA-pinned (SD-6.1 / F-16) with a trailing `# vN` for readability, and
# checkout sets `persist-credentials: false` (the job only reads) — same hardening as
# security.yml, self-flagged by its zizmor job.

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    name: lint · typecheck · test · audit
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: void_test
        ports:
          - 5432:5432
        # Wait until the DB accepts connections before the job's steps run.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # store.test.ts runs its Postgres adapter contracts only when this is set; every
      # other test either uses in-memory stores or passes an explicit empty env.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/void_test

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # pnpm version comes from package.json "packageManager"
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Gate (lint + typecheck + test, incl. Postgres adapters)
        run: pnpm run check

      - name: Dependency audit
        run: pnpm audit --audit-level=high

      # M2 perf report (metrics-roadmap): CPU frame cost of the prototype's render
      # loop (idle/pan/zoom) against the p95 budget. Non-blocking by design — the
      # report shows up in the job log for review; flip to PERF_STRICT=1 to gate.
      - name: Perf report (non-blocking)
        run: pnpm run perf
        continue-on-error: true

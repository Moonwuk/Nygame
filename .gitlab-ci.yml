# ===========================================================================
# 7) SBOM — Software Bill of Materials
# ===========================================================================
sbom-syft:
  stage: sbom
  needs: []
  image:
    name: anchore/syft:v1.20.0
    entrypoint: ['']
  script:
    - syft . -o cyclonedx-json=sbom.cdx.json -o table
  artifacts:
    paths: [sbom.cdx.json]
    when: always

# ===========================================================================
# 8) QUALITY GATE & AI FEEDBACK LOOP
# ===========================================================================
security-gate-and-feedback:
  stage: report
  image: python:3.11-slim
  needs:
    - job: sast-semgrep
      artifacts: true
    - job: sast-njsscan
      artifacts: true
    - job: sast-bearer
      artifacts: true
    - job: sca-osv-scanner
      artifacts: true
    - job: sca-retire
      artifacts: true
    - job: sca-grype
      artifacts: true
    - job: secrets-gitleaks
      artifacts: true
    - job: secrets-trufflehog
      artifacts: true
    - job: trivy-fs
      artifacts: true
    - job: iac-checkov
      artifacts: true
  variables:
    MAX_CRITICAL: 0
    MAX_HIGH: 0
  script:
    - pip install requests || true
    - |
      python3 << 'PYTHON_SCRIPT'
      import os, json, glob, requests

      # 1. Считаем находки из всех SARIF
      critical = 0
      high = 0
      findings_text = ""

      def parse_sarif(file_path):
          global critical, high, findings_text
          if not os.path.exists(file_path): return
          try:
              with open(file_path) as f:
                  data = json.load(f)
              for run in data.get('runs', []):
                  tool = run.get('tool', {}).get('driver', {}).get('name', 'Unknown')
                  for res in run.get('results', []):
                      level = res.get('level', 'note')
                      msg = res.get('message', {}).get('text', 'No message')[:100]
                      if level == 'error': critical += 1
                      elif level == 'warning': high += 1
                      if level in ['error', 'warning']:
                          findings_text += f"- **[{tool}]** ({level.upper()}): {msg}\n"
          except Exception as e:
              print(f"Error parsing {file_path}: {e}")

      # Парсим все SARIF файлы
      for f in glob.glob('*.sarif'): 
          parse_sarif(f)
          print(f"Parsed: {f}")
      
      # Парсим JSON отчеты (njsscan, trufflehog)
      for f in glob.glob('*.json'):
          if 'sarif' not in f and 'report' not in f:
              print(f"Skipping non-SARIF: {f}")

      # 2. Формируем Markdown
      passed = critical <= int(os.getenv('MAX_CRITICAL', 0)) and high <= int(os.getenv('MAX_HIGH', 0))
      
      status_emoji = "✅" if passed else "🚨"
      status_text = "PASSED" if passed else "FAILED"
      
      comment = f"""
      ## {status_emoji} Security Quality Gate: **{status_text}**
      
      | Severity | Count | Limit |
      |----------|-------|-------|
      | 🔴 Critical | {critical} | {os.getenv('MAX_CRITICAL', 0)} |
      | 🟠 High | {high} | {os.getenv('MAX_HIGH', 0)} |
      
      ### Findings (первые 20):
      {findings_text if findings_text else "No issues found. Great job!"}
      
      ---
      *Scanners: Semgrep, njsscan, Bearer, OSV-Scanner, Retire, Grype, Gitleaks, TruffleHog, Trivy, Checkov*
      *Generated by GitLab CI SSDLC Pipeline*
      """

      # 3. Отправляем в MR
      mr_iid = os.getenv('CI_MERGE_REQUEST_IID')
      if mr_iid:
          url = f"{os.getenv('CI_API_V4_URL')}/projects/{os.getenv('CI_PROJECT_ID')}/merge_requests/{mr_iid}/notes"
          headers = {"PRIVATE-TOKEN": os.getenv('GITLAB_API_TOKEN')}
          try:
              resp = requests.post(url, json={"body": comment}, headers=headers, timeout=10)
              if resp.status_code == 201:
                  print(f"✅ Comment posted to MR !{mr_iid}")
              else:
                  print(f"❌ Failed to post comment: {resp.status_code} - {resp.text}")
          except Exception as e:
              print(f"❌ Error posting comment: {e}")
      else:
          print("Not a Merge Request pipeline. Skipping comment.")
          print(comment)  # Выводим в логи для отладки

      # 4. Решение Quality Gate
      if not passed:
          print(f"\n🚨 Quality Gate FAILED. Critical: {critical}, High: {high}")
          exit(1)
      else:
          print(f"\n✅ Quality Gate PASSED. Code is safe to merge.")
          exit(0)
      PYTHON_SCRIPT
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: always
  allow_failure: false

# Void Dominion — the WHOLE stack in one command (REL-3, decided deploy: self-hosted VPS):
#
#   cd deploy && docker compose up -d --build   # Postgres + game server, self-healing
#
# What you get:
#   http://<host>:8788/        — the game (players just open the link; wss:// auto-fills)
#   http://<host>:8788/health  — liveness (the container healthcheck hits it too)
# Fault tolerance:
#   - restart: unless-stopped on BOTH services — a crash/OOM/reboot self-heals
#     (enable `systemctl enable docker` so the daemon itself starts on boot).
#   - Durable matches: the server snapshots to Postgres (DATABASE_URL below), so a
#     server restart RESUMES the running match instead of losing it; pg data lives
#     in the `void-pgdata` volume and survives container re-creation.
#   - Healthchecks gate startup order (server waits for a HEALTHY postgres) and feed
#     Docker's restart decisions; logs are bounded so they can't fill the disk.
#   - Backups/updates/restore: see deploy/README.md (runbook).
# Postgres is bound to 127.0.0.1 ONLY — never exposed publicly (the server reaches it
# over the compose network). Set a real POSTGRES_PASSWORD in the environment (or an
# .env file next to this compose) for anything beyond a local test.
services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '8788:8788'
    environment:
      PORT: 8788
      # Release posture: only validated action.v1 envelopes are accepted (the bundled
      # client auto-detects via welcome.gated). Set GATE=0 to fall back to bare actions.
      GATE: ${GATE:-1}
      # Release posture: seat tickets — a nick's first join mints a secret its client
      # stores and must present to reconnect, so a URL+nick alone can't take a seat.
      # Set SEAT_LOCK=0 to fall back to the open dev handshake.
      SEAT_LOCK: ${SEAT_LOCK:-1}
      # Wall→game clock multiplier. The FIRST playtest session runs ×24 (SES-2.6:
      # 1 real hour = 1 game day — a full session cycle inside days, not weeks);
      # the absence/entry windows stay in REAL time regardless (3d grace, 4d join).
      # Set TIME_SCALE=1 for the real-time 24/7 posture.
      TIME_SCALE: ${TIME_SCALE:-24}
      # Accounts (SES-2.5): set a real secret to switch the playable path to full
      # register/login (session JWT + join tokens; nick/ticket handshakes refused).
      # Unset ⇒ the nick+ticket flow (zero-setup LAN playtests). Keep the secret
      # STABLE across restarts or every player must log in again.
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      # How many independent sessions this ONE process hosts (proto, proto-2, …):
      # all appear in the in-game match browser; each is durable in Postgres.
      MATCHES: ${MATCHES:-1}
      # Durable matches: snapshots to the postgres service over the compose network.
      DATABASE_URL: postgres://void:${POSTGRES_PASSWORD:-void}@postgres:5432/void
    depends_on:
      postgres:
        condition: service_healthy
    # The image bakes its own HEALTHCHECK (GET /health); compose inherits it.
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: void
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-void}
      POSTGRES_DB: void
    ports:
      - '127.0.0.1:5432:5432' # loopback only — psql/pg_dump from the host; never public
    volumes:
      - void-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U void -d void']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

volumes:
  void-pgdata:

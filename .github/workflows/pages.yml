name: Play in browser (GitHub Pages)

# Builds the self-contained prototype HTML and publishes it to GitHub Pages, so the
# game can be tried in a browser with no install at https://moonwuk.github.io/Nygame/.
# configure-pages runs with enablement: true, so the workflow turns Pages on itself
# (needs the pages: write permission granted below) — no manual repo-settings step.
# If your org policy forbids token-based enablement, do it once by hand instead:
# Settings → Pages → "Build and deployment" → Source: "GitHub Actions".
# This workflow deploys on every push to main. Actions are SHA-pinned (SD-6.1 / F-16).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'prototype/**'
      - 'packages/shared-core/**'
      - 'packages/client/**'
      - 'data/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build prototype + deploy to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4 (version from package.json "packageManager")

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Build the self-contained prototype
        run: |
          pnpm install --frozen-lockfile
          pnpm run prototype

      - name: Stage the site (prototype HTML as index.html)
        run: |
          mkdir -p _site
          cp prototype/dist/void-dominion.html _site/index.html

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

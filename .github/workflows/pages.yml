name: Play in browser (GitHub Pages)

# Builds the self-contained prototype HTML and publishes it to GitHub Pages, so the
# game can be tried in a browser with no install at https://moonwuk.github.io/Nygame/.
#
# ⚠ ONE-TIME MANUAL STEP (the reason every run failed until now — 0 green out of 119):
# GitHub Pages must be enabled in the repo settings FIRST — Settings → Pages →
# "Build and deployment" → Source: "GitHub Actions". Until then the
# `environment: github-pages` gate refuses the job BEFORE its first step (failure
# signature: the run fails in ~3s, the job shows NO steps, logs 404) — so
# configure-pages `enablement: true` never gets a chance to run and cannot self-enable
# out of this state. After that single toggle, every push to main deploys and the Pages
# link is always the latest build (the browser "auto-update": nothing to update — the
# link IS the current version).
# This workflow deploys on every push to main. Actions are SHA-pinned (SD-6.1 / F-16).

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'prototype/**'
      - 'packages/shared-core/**'
      - 'packages/client/**'
      - 'data/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

# One live deployment at a time; a newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build prototype + deploy to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4 (version from package.json "packageManager")

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Build the self-contained prototype
        run: |
          pnpm install --frozen-lockfile
          pnpm run prototype

      - name: Stage the site (prototype HTML as index.html)
        run: |
          mkdir -p _site
          cp prototype/dist/void-dominion.html _site/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

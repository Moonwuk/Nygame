name: Android APK (prototype)

# Builds an installable debug APK of the prototype by wrapping the self-contained
# prototype HTML in a Capacitor WebView (branded icon/splash, locked to portrait).
# Runs on GitHub's ubuntu runner, which has the Android SDK preinstalled. On main it
# also publishes the APK to a rolling "alpha" prerelease for a stable download link;
# every run still uploads the APK as a build artifact too.
# Actions are SHA-pinned (SD-6.1 / F-16); the trailing `# vN` comments track versions.

on:
  workflow_dispatch:
  push:
    branches: [main, claude/awesome-bohr-ygnunp]
    paths:
      - 'prototype/**'
      - 'mobile/**'
      - '.github/workflows/android.yml'

# contents: write lets the build publish the APK to the rolling "alpha" release.
permissions:
  contents: write

jobs:
  build-apk:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4 (version from package.json "packageManager")

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build the prototype (self-contained HTML)
        run: |
          pnpm install --frozen-lockfile
          pnpm run prototype

      - name: Stage web assets + install Capacitor
        working-directory: mobile
        run: |
          mkdir -p www
          cp ../prototype/dist/void-dominion.html www/index.html
          npm install

      - name: Generate the Android project
        working-directory: mobile
        run: |
          npx cap add android
          npx cap sync android

      - name: Brand the app (icon + splash) and lock to portrait
        working-directory: mobile
        run: |
          npx capacitor-assets generate --android
          node patch-android.mjs

      # Sign with a COMMITTED debug keystore (standard android/android credentials —
      # not a secret) so every build has the SAME signature. Without this, the Gradle
      # debug keystore is regenerated per run, so installing an update over a previously
      # sideloaded build fails with "conflicts with another package" (signature mismatch).
      - name: Pin the debug signing key (stable signature across builds)
        run: |
          mkdir -p ~/.android
          cp mobile/debug.keystore ~/.android/debug.keystore

      - name: Assemble debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: void-dominion-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # A stable, shareable download link for the alpha: keep one rolling prerelease
      # tagged "alpha" whose asset URL never changes, refreshed on every main build.
      # Only from main — branch builds still produce the artifact above, just no release.
      - name: Publish to the rolling "alpha" release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp mobile/android/app/build/outputs/apk/debug/app-debug.apk void-dominion-alpha.apk
          {
            echo "Rolling alpha — the latest debug APK built from main (${GITHUB_SHA:0:7})."
            echo
            echo "Install on Android:"
            echo "1. Download void-dominion-alpha.apk below."
            echo "2. Open it; allow \"install from unknown sources\" if prompted."
            echo "3. Launch — single-player works fully offline. The app runs in portrait."
            echo
            echo "Debug-signed (testing only, not Play-Store ready). For multiplayer, point the"
            echo "connect screen at a host running pnpm dev:proto-server (see docs/multiplayer.md)."
          } > release-notes.md
          gh release delete alpha --cleanup-tag --yes 2>/dev/null || true
          gh release create alpha void-dominion-alpha.apk \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "Void Dominion — Alpha (rolling)" \
            --notes-file release-notes.md

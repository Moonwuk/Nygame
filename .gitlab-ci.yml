# GitLab CI/CD — полный DevSecOps пайплайн для Nygame
#
# Философия: SHIFT-LEFT + DEFENSE-IN-DEPTH
# - Каждый класс сканера закрывает свой вектор атаки
# - Все инструменты открытые (работают на GitLab Free)
# - Quality Gate анализирует все отчеты и блокирует мерж при Critical/High
#
# СТРУКТУРА:
# 1. Build/Test — функциональный гейт
# 2. Security — 10+ сканеров параллельно (SAST, SCA, Secrets, IaC, License)
# 3. SBOM — инвентаризация компонентов
# 4. Quality Gate — агрегация отчетов + автокомментарий в MR

stages:
  - build
  - test
  - security
  - sbom
  - report

variables:
  PNPM_VERSION: '10'
  NODE_IMAGE: 'node:22-bookworm-slim'
  GIT_DEPTH: '0' # Для полного сканирования git-истории (Gitleaks)

# ===========================================================================
# БАЗОВЫЕ ШАБЛОНЫ
# ===========================================================================
.node:
  image: $NODE_IMAGE
  before_script:
    - corepack enable
    - corepack prepare pnpm@$PNPM_VERSION --activate
    - pnpm config set store-dir .pnpm-store
    - pnpm install --frozen-lockfile
  cache:
    key:
      files: [pnpm-lock.yaml]
    paths: [.pnpm-store]

# ===========================================================================
# 0) ФУНКЦИОНАЛЬНЫЙ ГЕЙТ
# ===========================================================================
lint-typecheck:
  extends: .node
  stage: build
  script:
    - pnpm run lint
    - pnpm run typecheck

unit-tests:
  extends: .node
  stage: test
  script:
    - pnpm run test --coverage
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    when: always

# ===========================================================================
# 1) SAST — Static Application Security Testing
# ===========================================================================

# Semgrep — основной SAST (TypeScript/JavaScript)
sast-semgrep:
  stage: security
  needs: []
  image:
    name: semgrep/semgrep:latest
    entrypoint: ['']
  script:
    - semgrep scan --config=p/typescript --config=p/javascript --config=p/security-audit
      --sarif --output semgrep.sarif --error || true
    - semgrep scan --config=p/typescript --config=p/javascript --config=p/security-audit
      --gitlab-sast --output gl-sast-report.json || true
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths: [semgrep.sarif]
    when: always
  allow_failure: true

# njsscan — специфичный SAST для Node.js
sast-njsscan:
  stage: security
  needs: []
  image:
    name: python:3.11-slim
    entrypoint: ['']
  script:
    - pip install njsscan
    - njsscan --json --output njsscan.json . || true
  artifacts:
    paths: [njsscan.json]
    when: always
  allow_failure: true

# Bearer — data flow analysis (ищет проблемы с обработкой данных)
sast-bearer:
  stage: security
  needs: []
  image:
    name: bearer/bearer:latest
    entrypoint: ['']
  script:
    - bearer scan . --format sarif --output bearer.sarif || true
  artifacts:
    paths: [bearer.sarif]
    when: always
  allow_failure: true

# ===========================================================================
# 2) SCA — Software Composition Analysis (зависимости)
# ===========================================================================

# pnpm audit — нативная проверка npm-зависимостей
sca-pnpm-audit:
  extends: .node
  stage: security
  needs: []
  script:
    - pnpm audit --audit-level=high
  allow_failure: false # high/critical блокируют мерж

# OSV-Scanner — Google OSV (агрегирует GHSA/CVE/Go/PyPI)
sca-osv-scanner:
  stage: security
  needs: []
  image:
    name: ghcr.io/google/osv-scanner:v1.9.1
    entrypoint: ['']
  script:
    - /osv-scanner --lockfile=pnpm-lock.yaml --format sarif --output osv.sarif || true
    - /osv-scanner --lockfile=pnpm-lock.yaml || true
  artifacts:
    paths: [osv.sarif]
    when: always
  allow_failure: true

# Retire.js — классический SCA для JavaScript
sca-retire:
  stage: security
  needs: []
  image:
    name: node:22-bookworm-slim
    entrypoint: ['']
  script:
    - npm install -g retire
    - retire --path . --outputformat sarif --outputpath retire.sarif || true
  artifacts:
    paths: [retire.sarif]
    when: always
  allow_failure: true

# Grype — альтернативный SCA от Anchore (перекрестная проверка)
sca-grype:
  stage: security
  needs: []
  image:
    name: anchore/grype:latest
    entrypoint: ['']
  script:
    - grype dir:. --output sarif > grype.sarif || true
  artifacts:
    paths: [grype.sarif]
    when: always
  allow_failure: true

# ===========================================================================
# 3) Secret Detection — поиск утекших секретов
# ===========================================================================

# Gitleaks — основной сканер секретов (regex + энтропия)
secrets-gitleaks:
  stage: security
  needs: []
  image:
    name: zricethezav/gitleaks:v8.18.4
    entrypoint: ['']
  script:
    - gitleaks detect --source . --log-opts="--all" --redact --verbose
      --report-format sarif --report-path gitleaks.sarif
  artifacts:
    paths: [gitleaks.sarif]
    when: always
  allow_failure: false # утекший секрет = стоп-кран

# TruffleHog — альтернативный сканер (перекрестная проверка)
secrets-trufflehog:
  stage: security
  needs: []
  image:
    name: trufflesecurity/trufflehog:latest
    entrypoint: ['']
  script:
    - trufflehog filesystem --directory=. --json > trufflehog.json || true
  artifacts:
    paths: [trufflehog.json]
    when: always
  allow_failure: true

# ===========================================================================
# 4) IaC & Misconfiguration Scanner
# ===========================================================================

# Trivy fs — vuln + secret + misconfig в одном проходе
trivy-fs:
  stage: security
  needs: []
  image:
    name: aquasec/trivy:0.58.2
    entrypoint: ['']
  script:
    - trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL
      --format sarif --output trivy.sarif --exit-code 0 .
    - trivy fs --scanners vuln,secret,misconfig --severity HIGH,CRITICAL
      --exit-code 1 . || true
  artifacts:
    paths: [trivy.sarif]
    when: always
  allow_failure: true
  
secrets-gitleaks:
  stage: security
  needs: []
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: ['']
  script:
    # 👇 ЗАМЕНИТЕ СТАРУЮ СТРОКУ НА ЭТУ:
    - gitleaks detect --source . --log-opts="--all" --redact --verbose --report-format sarif --report-path gitleaks.sarif
  artifacts:
    paths: [gitleaks.sarif]
    when: always
  allow_failure: false

# Checkov — специализированный IaC scanner (Dockerfile, Terraform, K8s)
iac-checkov:
  stage: security
  needs: []
  image:
    name: bridgecrew/checkov:latest
    entrypoint: ['']
  script:
    - checkov -d . --output sarif --output-file-path checkov.sarif || true
  artifacts:
    paths: [checkov.sarif]
    when: always
  allow_failure: true

# ===========================================================================
# 5) License Scanner — проверка совместимости лицензий
# ===========================================================================
license-check:
  stage: security
  needs: []
  image:
    name: node:22-bookworm-slim
    entrypoint: ['']
  script:
    - npm install -g license-checker
    - license-checker --json --out license-report.json || true
    - license-checker --summary || true
  artifacts:
    paths: [license-report.json]
    when: always
  allow_failure: true

